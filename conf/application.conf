play.http.secret.key = "dev-play-secret-change-me-please-change-this-value-2026"
play.http.secret.key = ${?PLAY_SECRET_KEY}

play.modules.enabled += "Module"
play.http.errorHandler = "errors.ApiErrorHandler"
play.filters.hosts.allowed += "backend"
play.filters.hosts.allowed += "backend:9000"

play.filters.enabled += play.filters.cors.CORSFilter
play.filters.disabled += play.filters.csrf.CSRFFilter
play.filters.cors {
  pathPrefixes = ["/api"]
  allowedOrigins = ["http://localhost:3000", "http://localhost:5173", "http://localhost:8080"]
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
  allowedHttpHeaders = ["Accept", "Authorization", "Content-Type", "Origin", "X-Requested-With"]
  exposedHeaders = ["Authorization"]
  supportsCredentials = true
}

db.default.driver = org.postgresql.Driver
db.default.url = "jdbc:postgresql://localhost:5432/play_react_db"
db.default.url = ${?DB_URL}
db.default.username = "postgres"
db.default.username = ${?DB_USER}
db.default.password = "postgres"
db.default.password = ${?DB_PASSWORD}

jwt.secret = "super-secret-jwt-key-change-me"
jwt.secret = ${?JWT_SECRET}
jwt.issuer = "play-backend"
jwt.expirationSeconds = 3600

app.timezone = "America/Argentina/Buenos_Aires"
app.timezone = ${?APP_TIMEZONE}
