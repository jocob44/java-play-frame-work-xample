
services:
  postgres:
    image: postgres:16
    container_name: play-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: play_react_db
    ports:
      - "5432:5432"
    volumes:
      - play_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d play_react_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  play_postgres_data: