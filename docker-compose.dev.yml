services:
  postgres:
    image: postgres:16
    container_name: play-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: play_react_db
    ports:
      - "5432:5432"
    volumes:
      - play_postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d play_react_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: play-backend-dev
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/play_react_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PLAY_SECRET_KEY: dev-play-secret-change-me-please-change-this-value-2026
      JWT_SECRET: super-secret-jwt-key-change-me
      APP_TIMEZONE: America/Argentina/Buenos_Aires
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:22
    container_name: play-frontend-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      VITE_PROXY_TARGET: http://backend:9000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules_dev:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  play_postgres_data_dev:
  frontend_node_modules_dev:
